<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Horizons — Hero</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Domine:wght@400;500;600;700&display=swap');

  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#3D001A}
  body{overflow:hidden;-webkit-font-smoothing:antialiased}

  .stage{position:relative;width:100%;height:100vh;overflow:hidden;background:#3D001A}

  /* ---- VIDEO: fills the frame ---- */
  .video{position:absolute;inset:0;z-index:0}
  .video video{width:100%;height:100%;object-fit:cover;display:block}

  /* ---- SAND/WINE DOT-MATRIX TEXTURE (delicate) ----
     KNOBS: wash alpha (.05), dot alpha (.30), grid (4px), dot size (.6px). */
  .tint{
    position:absolute;inset:0;z-index:1;pointer-events:none;
    background-color:rgba(96,3,42,.05);
    background-image:radial-gradient(circle at center,
                     rgba(96,3,42,.30) 0 .6px, transparent 1px);
    background-size:4px 4px;
  }

  /* ---- TYPED HEADLINE ---- */
  .hero-type{
    position:absolute;inset:0;z-index:3;
    display:flex;align-items:center;justify-content:center;
    padding:0 5vw;text-align:center;
  }
  .type{
    font-family:'Domine',serif;font-weight:600;color:#FDF6EB;
    font-size:clamp(34px,5.5vw,78px);line-height:1.12;letter-spacing:.005em;
    max-width:min(92vw,980px);
    text-shadow:0 2px 30px rgba(28,5,16,.5);
    /* min-height reserves ~2 lines so the video doesn't jump as text types in */
    min-height:2.24em;
  }
  .type-text{white-space:pre-wrap}
  /* the blinking caret */
  .cursor{
    display:inline-block;margin-left:.03em;font-weight:400;
    color:#FAA32B;transform:translateY(.02em);
    animation:hz-blink 1.05s steps(1) infinite;
  }
  @keyframes hz-blink{50%{opacity:0}}

  @media (prefers-reduced-motion:reduce){
    .cursor{animation:none}
  }
</style>
</head>
<body>
  <div class="stage">

    <div class="video">
      <video src="https://birdasaurus.com/horizons/horizons_hero.mp4"
             muted autoplay loop playsinline preload="auto"></video>
    </div>

    <div class="tint"></div>

    <div class="hero-type">
      <h1 class="type"><span class="type-text"></span><span class="cursor">|</span></h1>
    </div>

  </div>

<script>
  /* Cursor-typing entrance. Multi-line safe (appends text, lets it wrap).
     Honors reduced-motion by showing the full line immediately. */
  (function(){
    var FULL = "Join today\u2019s leaders shaping tomorrow\u2019s workplace.";
    var SPEED = 55;        // ms per character
    var START = 500;       // ms delay after load before typing begins
    var el = document.querySelector('.type-text');
    if(!el) return;

    var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion:reduce)').matches;
    if(reduce){ el.textContent = FULL; return; }

    var i = 0;
    function tick(){
      el.textContent = FULL.slice(0, i);
      if(i++ < FULL.length) setTimeout(tick, SPEED);
    }
    window.addEventListener('load', function(){ setTimeout(tick, START); });
  })();
</script>
</body>
</html>
