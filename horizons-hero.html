<script>
/* ============================================================
   Cursor-typing reveal for the outlined-text SVG (#headline).
   The SVG already contains two baselines, so we DON'T reflow — we just
   group the glyphs into their two rows, reveal them in reading order
   (top row left->right, then bottom row), and slide a thin caret along,
   jumping to row 2 and blinking forever at the end.
   reduced-motion or any error -> full headline shown.
   KNOBS: SPEED (ms/char), START (delay before typing).
   ============================================================ */
(function(){
  var SPEED = 60, START = 450;
  var svg = document.getElementById('headline');
  if(!svg) return;
  var paths = [].slice.call(svg.querySelectorAll('path'));
  function showAll(){ paths.forEach(function(p){ p.style.opacity='1'; }); }
  paths.forEach(function(p){ p.style.opacity='0'; });   // hide (tiny flash at worst)

  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion:reduce)').matches;

  function run(){
    try{
      var g = paths.map(function(p){ var b=p.getBBox();
        return {el:p, x:b.x, r:b.x+b.width, cy:b.y+b.height/2, top:b.y, bottom:b.y+b.height}; });

      // split into rows at the largest vertical gap between glyph centres
      var cys = g.map(function(o){return o.cy;}).sort(function(a,b){return a-b;});
      var biggest=-1, thr=null;
      for(var i=0;i<cys.length-1;i++){ var d=cys[i+1]-cys[i]; if(d>biggest){ biggest=d; thr=(cys[i]+cys[i+1])/2; } }
      g.forEach(function(o){ o.row = (thr!=null && o.cy>thr) ? 1 : 0; });

      var row0 = g.filter(function(o){return o.row===0;}).sort(function(a,b){return a.x-b.x;});
      var row1 = g.filter(function(o){return o.row===1;}).sort(function(a,b){return a.x-b.x;});
      function box(r){ var t=1e9,b=-1e9; r.forEach(function(o){ t=Math.min(t,o.top); b=Math.max(b,o.bottom); }); return {top:t,bot:b}; }
      var rb = [box(row0), box(row1)];
      var order = row0.concat(row1);

      // caret
      var vbw = (svg.viewBox && svg.viewBox.baseVal && svg.viewBox.baseVal.width) || 1498;
      var caretW = vbw*0.006;   // proportional to viewBox (no fixed floor)
      var caret = document.createElementNS('http://www.w3.org/2000/svg','rect');
      caret.id='hz-caret'; caret.setAttribute('width',caretW); caret.setAttribute('rx',caretW/2);
      svg.appendChild(caret);
      function place(o){ var b=rb[o.row];
        caret.setAttribute('x', o.r + caretW*1.4);
        caret.setAttribute('y', b.top);
        caret.setAttribute('height', b.bot-b.top);
      }
      place(order[0]); caret.classList.add('hz-blinking');

      if(reduce){ showAll(); place(order[order.length-1]); return; }
      var k=0;
      (function tick(){
        if(k<order.length){ order[k].el.style.opacity='1'; place(order[k]); k++; setTimeout(tick, SPEED); }
      })();
    }catch(e){ showAll(); }
  }

  if(reduce){ showAll(); return; }
  window.addEventListener('load', function(){ setTimeout(run, START); });
})();
</script>
