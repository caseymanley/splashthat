<title>Horizons — Hero</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  :root{
    --orange:#FAA32B; --cherry:#EE164F; --wine:#B0093C;
    --deep:#3D001A; --ink:#1C0510; --cream:#FDF6EB;
    --grad:linear-gradient(135deg,#FAA32B 0%,#EE164F 52%,#B0093C 100%);
    --dome:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCA3MSAzNycgcHJlc2VydmVBc3BlY3RSYXRpbz0nbm9uZSc+PHBhdGggZD0nTTQyLjkyMjIgMC45MjkyMzRDNDAuNDE1NCAwLjM2MDEwMiAzNy44MTQxIDAuMDYyMjE4NCAzNS4xMzQxIDAuMDYyMjA2MUMzMi40NTEzIDAuMDYyMjMwMiAzMC42MjU0IC0wLjIwMDU1NyAyOC4xMzcgMC4zNTM5NTRMMjQuOTE2MyAwLjkyOTc5NEM5LjQ0NDk1IDQuMzg3NzQgMC40NTg2OTYgMTguMDY0MyAtMC4wMDA5OTMwNTQgMzQuODcxMlYzNC44NzUxQy0wLjAyMDAxNjIgMzUuNjk3NyAwLjY1NzMzOSAzNi4zNTQzIDEuNDgwMjIgMzYuMzU0M0g2Ny45ODI1QzY5LjE5NjkgMzYuMzU0MyA3MC4xNzk5IDM1LjM3NzggNzAuMTUxNyAzNC4xNjM4TDcwLjE1MTIgMzQuMTU5OVYzMS4zMjJDNjguMDIzOCAxNS4yMTg3IDU4LjI1MTIgNC4zNTc0OCA0Mi45MjI0IDAuOTI5ODY5QzQyLjkyMjMgMC45Mjk4MzcgNDIuOTIyMiAwLjkyOTY1NiA0Mi45MjIzIDAuOTI5NTUxQzQyLjkyMjQgMC45Mjk0NDYgNDIuOTIyNCAwLjkyOTI2NyA0Mi45MjIyIDAuOTI5MjM0WicgZmlsbD0nJTIzZmZmJy8+PC9zdmc+");
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:var(--deep);height:100%}
  body{font-family:'Space Mono',monospace;-webkit-font-smoothing:antialiased;overflow:hidden}

  .stage{position:relative;height:100vh;width:100%;overflow:hidden;background:var(--deep)}

  /* full-frame gradient backdrop: guarantees a true edge-to-edge open state.
     Fades out on collapse so only the masked dome remains. */
  .backdrop{position:absolute;inset:0;z-index:1;background:var(--grad);
    transition:opacity .9s ease .35s}
  .is-collapsed .backdrop{opacity:0}

  /* ---- AMBIENT GLOW + TINY PULSE behind the settled dome (from the old hero) ---- */
  .glow{
    position:absolute; left:50%; bottom:-6vh; transform:translateX(-50%);
    width:min(120vh,108vw); aspect-ratio:1/1; border-radius:50%;
    background:radial-gradient(circle at 50% 60%, rgba(250,163,43,.55), rgba(238,22,79,.25) 42%, transparent 68%);
    filter:blur(40px); z-index:1; opacity:0;
    transition:opacity 1.1s ease 1.15s;
    will-change:filter,opacity;
  }
  .is-collapsed .glow{opacity:1; animation:hz-glow 9s ease-in-out 1.9s infinite}
  @keyframes hz-glow{
    0%,100%{filter:blur(40px) hue-rotate(0deg) brightness(1)}
    50%{filter:blur(52px) hue-rotate(-9deg) brightness(1.08)}
  }
  /* tiny pulse ring rising from the dome crown */
  .pulse{
    position:absolute; left:50%; bottom:30vh; transform:translate(-50%,50%);
    width:60px; height:60px; border-radius:50%;
    border:2px solid rgba(253,246,235,.5);
    z-index:3; opacity:0; pointer-events:none;
  }
  .is-collapsed .pulse{animation:hz-pulse 3.4s ease-out 2.0s infinite}
  @keyframes hz-pulse{
    0%{transform:translate(-50%,50%) scale(.4);opacity:.55}
    70%{opacity:0}
    100%{transform:translate(-50%,50%) scale(2.4);opacity:0}
  }

  /* ---- DOME: masked box holding gradient + photo. Scales from huge (full-bleed) to natural. ---- */
  .dome{
    position:absolute; left:50%; bottom:0;
    width:min(121vh,108vw); aspect-ratio:71/37;
    -webkit-mask:var(--dome) center/100% 100% no-repeat;
            mask:var(--dome) center/100% 100% no-repeat;
    z-index:2;
    transform:translateX(-50%) translateY(0) scale(2.2);
    transform-origin:50% 100%;
    transition:transform 1.5s cubic-bezier(.65,0,.35,1);   /* ease-in-out */
    will-change:transform;
  }
  .is-collapsed .dome{ transform:translateX(-50%) translateY(0) scale(1) }
  .dome .layer{position:absolute;inset:0}
  .grad-layer{background:var(--grad)}
  .video-layer{opacity:0;transition:opacity 1.2s ease 1.2s}
  .is-collapsed .video-layer{opacity:1}
  .video-layer video{width:100%;height:100%;object-fit:cover;display:block}

  /* ---- ARC TEXT: rotates along the TOP arc only, OUTSIDE the dome with margin. ---- */
  .arc{
    position:absolute; left:50%; bottom:0;
    width:min(121vh,108vw); aspect-ratio:71/37;
    transform:translateX(-50%);
    z-index:4; pointer-events:none; opacity:0; overflow:visible;
    transition:opacity .9s ease 1.0s;
  }
  .is-collapsed .arc{opacity:1}
  /* spinner group rotates around the dome's base-center (= rotation origin of the arc) */
  .arc-spin{transform-box:view-box;transform-origin:35.5px 36px;animation:spin 90s linear infinite;animation-delay:-7.5s}
  @keyframes spin{to{transform:rotate(-360deg)}}
  .arc text{
    font-family:'Gotham Bold','Gotham','Helvetica Neue',Arial,sans-serif;
    font-weight:700; letter-spacing:.26em; text-transform:uppercase;
    font-size:1.35px; fill:var(--cream);
  }

  /* ---- LOGO: centered start; settles centered in dome, ~2x bigger than before ---- */
  .logo{
    position:absolute; left:50%; top:50%; z-index:5;
    width:min(58vw,720px); height:auto;
    transform:translate(-50%,-50%);
    transition:transform 1.4s cubic-bezier(.65,0,.35,1), width 1.4s cubic-bezier(.65,0,.35,1);
    filter:drop-shadow(0 6px 40px rgba(0,0,0,.28));
    will-change:transform;
  }
  .logo svg{width:100%;height:auto;display:block}
  .is-collapsed .logo{
    width:min(62vw,720px);                       /* ~2x the prior 40vw/460px */
    transform:translate(-50%,calc(-50% + 20vh));
  }

  .cta{
    position:absolute; z-index:7; left:50%; bottom:9vh; transform:translateX(-50%) translateY(12px);
    opacity:0; transition:opacity .7s ease 1.35s, transform .7s ease 1.35s;
    background:var(--ink); color:var(--cream); font-family:'Space Mono',monospace; font-weight:700;
    text-transform:uppercase; letter-spacing:.16em; font-size:14px;
    border:0; border-radius:40px; padding:16px 34px; cursor:pointer;
    box-shadow:0 12px 30px rgba(28,5,16,.4);
  }
  .is-collapsed .cta{opacity:1; transform:translateX(-50%) translateY(0)}

  @media (prefers-reduced-motion:reduce){
    .dome,.logo,.photo-layer,.arc,.cta{transition:none!important}
    .arc-spin{transform-box:view-box;transform-origin:35.5px 36px;animation:spin 90s linear infinite;animation-delay:-7.5s}
  }
</style>
