<!-- ============================================================
     HORIZONS — TICKER (self-contained iframe for Splash)
     Infinite side-scroll of date / time / location, separated by the
     hand-drawn horizon sun. Scoped under #hz-tk (all:initial reset) so
     it can't touch the rest of the page. Pure CSS scroll, no JS needed.
     Embed via an iframe element pointing at the hosted URL (see README
     snippet). Pauses on hover; respects reduced-motion.
     ============================================================ -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap">
<div id="hz-tk">
<style>

#hz-tk{
  all:initial;display:block;box-sizing:border-box;width:100%;
  background:#3D001A;overflow:hidden;position:relative;
  /* gradient line removed — the thin divider below the ticker stays */
  border:0;
}
#hz-tk *{box-sizing:border-box;margin:0;padding:0}

/* the moving rail = two identical sequences back-to-back.
   translateX(-50%) advances exactly one sequence -> seamless loop.
   KNOB: animation duration (38s). Higher = slower scroll. */
#hz-tk .track{
  display:flex;width:max-content;align-items:center;
  animation:hz-tkscroll 38s linear infinite;
  will-change:transform;
}
#hz-tk .seq{display:flex;align-items:center;flex:0 0 auto}

#hz-tk .item{
  font-family:'Archivo Black',sans-serif;text-transform:uppercase;
  color:#FDF6EB;white-space:nowrap;line-height:1;
  font-size:1.2rem;letter-spacing:.02em;
  padding:20px 0;margin:0 .5em;
}
/* small bullet separator — same sunset color as the old suns */
#hz-tk .sun{
  flex:0 0 auto;margin:0 .85em;
  font-size:1.2rem;
  width:.4em;height:.4em;border-radius:50%;
  background:linear-gradient(120deg,#FAA32B,#EE164F 55%,#B0093C);
}

#hz-tk:hover .track{animation-play-state:paused}

@keyframes hz-tkscroll{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}
@media (prefers-reduced-motion:reduce){
  #hz-tk .track{animation:none;justify-content:center}
}
</style>

<div class="track">
  <div class="seq">
    <span class="item">Wednesday 18 Nov 2026</span><span class="sun"></span>
    <span class="item">08:30&#8211;17:30 GMT</span><span class="sun"></span>
    <span class="item">Protein Studios, Shoreditch</span><span class="sun"></span>
  </div>
  <div class="seq" aria-hidden="true">
    <span class="item">Wednesday 18 Nov 2026</span><span class="sun"></span>
    <span class="item">08:30&#8211;17:30 GMT</span><span class="sun"></span>
    <span class="item">Protein Studios, Shoreditch</span><span class="sun"></span>
  </div>
</div>
</div>
